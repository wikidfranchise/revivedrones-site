name: Refresh Real-Time Overdose Data

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: python scripts/refresh_realtime.py
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add realtime_od.json
          git diff --cached --quiet || (git commit -m "Auto-refresh realtime data $(date -u +%Y-%m-%d)" && git push)
