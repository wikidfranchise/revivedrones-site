var years=[2013, 2014, 2015, 2016, 2017, 2018, 2019, 2020, 2021, 2022, 2023, 2024, 2025, 2026];
var sel=document.getElementById("yearSel");
years.forEach(function(y){var o=document.createElement("option");o.value=y;o.text=y;sel.appendChild(o)});

// Chase deaths cluster
var cluster=L.markerClusterGroup({chunkedLoading:true,maxClusterRadius:50,
  iconCreateFunction:function(c){
    var n=c.getChildCount();
    var s=n<10?"small":n<100?"medium":"large";
    return L.divIcon({html:'<div style="background:rgba(255,140,0,0.85);width:100%;height:100%;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:11px;text-shadow:0 1px 2px rgba(0,0,0,.5)">'+n+'</div>',
      className:"marker-cluster marker-cluster-"+s,iconSize:L.point(40,40)})
  }
});

// OD county layer
var odLayer=L.layerGroup();

function radiusForDeaths(d){
  return Math.max(4, Math.min(40, Math.sqrt(d)*1.2));
}

function buildOD(){
  odLayer.clearLayers();
  odCounty.forEach(function(c){
    var r=radiusForDeaths(c[2]);
    var m=L.circleMarker([c[0],c[1]],{
      radius:r,color:"#44bbff",fillColor:"#44bbff",
      fillOpacity:0.35,weight:1,opacity:0.6
    });
    m.bindPopup("<b style='color:#44bbff'>"+c[3]+"</b><br><span style='font-size:13px;color:#ff4466;font-weight:700'>"+c[2].toLocaleString()+" overdose deaths</span><br><span style='font-size:11px;color:#aaa'>Latest 12-month period (CDC provisional)</span>");
    odLayer.addLayer(m);
  });
}

function buildPV(){
  cluster.clearLayers();
  var yr=sel.value;
  var n=0;
  pvData.forEach(function(p){
    if(yr==="all"||p[2]==yr){
      var m=L.circleMarker([p[0],p[1]],{radius:5,color:"#ff8c00",fillColor:"#ff8c00",fillOpacity:0.9,weight:1});
      m.bindPopup("<b style='color:#ff8c00'>"+p[3]+"</b><br><span style='font-size:11px'>Police Chase Death &bull; "+p[2]+"</span>");
      cluster.addLayer(m);
      n++;
    }
  });
  return n;
}

function rebuild(){
  var pvOn=document.getElementById("pvToggle").checked;
  var odOn=document.getElementById("odToggle").checked;
  var pvN=0;
  if(pvOn){
    map.addLayer(cluster);
    pvN=buildPV();
  }else{
    map.removeLayer(cluster);
  }
  if(odOn){
    buildOD();
    map.addLayer(odLayer);
  }else{
    map.removeLayer(odLayer);
  }
  var odTotal=odOn?75817:0;
  document.getElementById("count").textContent=
    (pvN+odTotal).toLocaleString()+" deaths shown"+(odOn?" ("+odTotal.toLocaleString()+" OD across 2858 counties)":"");
}

sel.addEventListener("change",function(){buildPV()});
document.getElementById("pvToggle").addEventListener("change",rebuild);
document.getElementById("odToggle").addEventListener("change",rebuild);
buildOD();
map.addLayer(odLayer);
map.addLayer(cluster);
buildPV();
rebuild();
</script></body></html>
